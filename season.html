<!DOCTYPE html>
<html>

<head>
    <title>Stupid-Fast - Players</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="./server.js"></script>
    <script src="./api.js"></script>
    <link rel="stylesheet" href="./css.css">

</head>

<body>
    <header><a href="./index.html"><img src="./sfbanner.png" alt="" /></a></header>

    <table id="t" cellpadding="3"></table>

</body>

<script>
    
    getSeason().then(async function(res) {
        console.log("res", res)
        const players = await getPlayers()
        res.forEach(function(each, i) {
            let tr = t.insertRow()
            tr.insertCell().innerText = i + 1
            tr.insertCell().innerHTML = "<b>" + players[each.id] + "</b>"
            tr.insertCell().innerText = each.sum
            tr.insertCell().innerHTML = "<small><i>" + (each.delta || "") + "</i></small>"
        })
    })

</script>

</html>
