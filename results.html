<!DOCTYPE html>
<html>
  <head>
    <title>Stupid-Fast - Results</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./server.js"></script>
    <link rel="stylesheet" href="./css.css" />

    <script></script>
  </head>

  <body>
    <header>
      <a href="./index.html"><img src="./sfbanner.png" alt="" /></a>
    </header>

    <section>
      <select id="selectrace" onchange="getResults(this.value)">
        <option value="">Select race...</option>
      </select>
    </section>

    <center id="th"></center>
    <center id="td1"></center>
    <center id="td2"></center>
    <center id="td3"></center>

    <table id="t"></table>
  </body>

  <script>
    let schedule = []
    getSchedule().then(function (res) {
      schedule = res
      res.forEach(function (each) {
        const opt = document.createElement('OPTION')
        opt.value = each.race_id
        opt.text = each.track_name
        selectrace.add(opt)
      })
      let find = res.find(function (each) {
        return !each.winner_driver_id
      })
      selectrace.value = find.race_id
      getResults(find.race_id)
    })

    function getResults(x) {
      t.innerHTML = null
      let race = schedule.find((each) => each.race_id == x)
      th.innerHTML = '<b>' + race.track_name + '</b>'
      td1.innerText =
        new Date(race.race_date).toUTCString().split('2026')[0] +
        ' @ ' +
        new Date(race.race_date).toLocaleTimeString()
      td2.innerText =
        race.television_broadcaster + ' & ' + race.radio_broadcaster
      td3.innerText = race.race_comments

      if (race.winner_driver_id) {
        fetch(
          'https://cf.nascar.com/data/cacher/production/2026/1/' +
            x +
            '/raceResults.json',
        )
          .then(function (res) {
            return res.json()
          })
          .then(function (res) {
            res = res.filter(function (each) {
              return each.finishing_position > 0
            })
            console.log('res', res)
            res.forEach(function (each) {
              let tr = t.insertRow()
              tr.id = each.driver_id
              tr.insertCell().innerText = each.finishing_position
              tr.insertCell().innerText = each.driver_fullname
              tr.insertCell()
              tr.insertCell()
            })
            getScores(x).then(function (scores) {
              console.log('scores', scores)
              scores.forEach(function (each) {
                let tr = document.getElementById(each.driverid)
                if (tr) {
                  tr.cells[2 + each.groupid].innerHTML +=
                    "<div title='" +
                    each.groupid +
                    "'><b class='" +
                    each.playerid +
                    "'>" +
                    each.playerid +
                    '</b> <small>' +
                    each.score +
                    '</small></div>'
                }
              })
              getPlayers().then(function (players) {
                for (let i in players) {
                  let bs = document.getElementsByClassName(i)
                  console.log(bs)
                  if (bs) {
                    for (let b of bs) {
                      b.innerText = players[i]
                    }
                  }
                }
              })
            })
          })
      }
    }
  </script>
</html>
