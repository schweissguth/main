    <script type="text/javascript">

fetch(
  'https://docs.google.com/spreadsheets/d/1EZdM6CERLzIYXAoPq8lTSdyiW8iVy6enuggciMDoXx4/gviz/tq?tqx=out:csv&sheet=INFO&range=A:B',
)
  .then(function (res) {
    return res.text()
  })
  .then(function (res) {
    res = res.replace(/\"/g, '')
    res = res.split('\n')
    res = res.map(function (each) {
      return each.split(',')
    })
    console.log(res)
    res.forEach(function (each) {
      let a = document.createElement('A')
      a.id = each[0]
      a.target = '_blank'
      let img = document.createElement('IMG')
      img.src = each[1]
      img.style.display = 'block'
      img.width = '213'
      img.style.borderRadius = "10px"
      img.style.margin = "15px"
      a.append(img)
      document.querySelector('CENTER').append(a)
    })

    getProgram(res)
  })

function getProgram(array) {
  array.forEach(function (each) {
    fetch(
      'https://docs.google.com/spreadsheets/d/1EZdM6CERLzIYXAoPq8lTSdyiW8iVy6enuggciMDoXx4/gviz/tq?tqx=out:csv&sheet=' +
        each[0] +
        '&range=A:A',
    )
      .then(function (res) {
        return res.text()
      })
      .then(function (res) {
        res = res.replace(/\"/g, '')
        res = res.split('\n')
        res = res.map(function (item) {
          return item.split(',')
        })
        let a = document.getElementById(each[0])
        let len = res.length
        let rand = Math.floor(Math.random() * len)
        a.href = res[rand][0]
      })
  })
}



  </script>

  <script>
    const allLines = []
    const cssElement = document.querySelector("#compiled-css")

    window.addEventListener("message", (message) => {

      if (message.data.css){
        cssElement.textContent = message.data.css.payload
      }

      if (message.data.html){
        document.body.innerHTML = message.data.html.payload
      }
    })

    if (window.parent){
      window.parent.postMessage({loaded: true}, "*")
    }
