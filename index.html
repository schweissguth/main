<!DOCTYPE html>
<html>

<head>
    <title>Stupid-Fast.com</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="./server.js"></script>
    <script src="./api.js"></script>
    <link rel="stylesheet" href="./css.css">

</head>

<body>
    <header><a href="./index.html"><img src="./sfbanner.png" alt="" /></a></header>

    <h3><a href="./picks.html">Click HERE to Make Picks</a></h3>
    <a href="https://www.driveraverages.com/">DriverAverages.com</a>
    <a href="./results.html">Results and schedule</a>
    <a href="./rules.html">Rules and info</a>
    <h3><a href="./season.html">Season standings</a></h3>
    <!--h3><a href="./chase">Chase standings</a></h3-->

    <table id="t1" cellpadding="3">
        <tr>
            <th>LOADING PICKS...</th>
        </tr>

    </table>

    <center>
        <div id="t2track"></div>
        <div id="t2broadcast"></div>
        <div id="t2laps"></div>
        <div id="t2stage"></div>

    </center>

    <table id="t3" cellpadding="3">
        <tr>
            <th>LOADING LEADERBOARD...</th>
        </tr>

    </table>

    <table id="t4" cellpadding="3">
        <tr>
            <th>LOADING PLAY BY PLAY...</th>
        </tr>

    </table>

    //--------


    <script>
  getSchedule().then(function (res) {
  const find = res.find((each) => !each.winner_driver_id);
  getPickOrder(find.race_id).then(function (res2) {
    console.log(res2);
    res2.sort(function (a, b) {
      return a.groupid - b.groupid;
    });
    getGroups().then(function (res6) {
  t1.innerHTML = null
      res6.forEach(function (each) {
        const tb = t1.createTBody();
        tb.id = each.gid;
        const tr = tb.insertRow();
        const th = document.createElement('TH');
        th.innerText = each.name;
        th.setAttribute('colspan', 2);
        tr.append(th);
      });
      res2.forEach(function (each) {
        const tb = document.getElementById(each.groupid);
        const tr = tb.insertRow();
        tr.id = each.playerid;
        tr.insertCell().innerHTML =
          '<b>' +
          each.playerid +
          '</b> ' +
          '<small>' +
          Math.floor(each.rank) +
          '</small>';
        tr.insertCell();
      });
      getPicks(find.race_id).then(function (res3) {
        res3.forEach(function (item) {
          const tr = document.getElementById(item.playerid);
          if (tr) {
            tr.cells[1].innerHTML +=
              "<div class='" + item.driverid + "'>" + item.driverid + '</div>';
          }
        });
        getDrivers().then(function (res4) {
          res4.forEach(function (forr) {
            let div = t1.getElementsByClassName(forr.driver_id);
            if (div) {
              for (let i = 0; i < div.length; i++) {
                div[i].innerText = forr.driver_name;
              }
            }
          });
          getPlayers().then(function (res5) {
            for (let i in res5) {
              document.getElementById(i).cells[0].querySelector('B').innerText =
                res5[i];
            }
          });
        });
      });
    });
  });
});
        
    </script>


    <script>
        getLeaderboard().then(function (res) {
            //console.log("liverace", res)
            t2track.innerHTML = "<u>" + res.track_name.toUpperCase() + "</u>"
            t2laps.innerText = "Lap " + res.lap_number + " of " + res.laps_in_race + " (" + res.laps_to_go + " laps to go)"
            let flags = [, "🟢", "🟡", , "🏁", , , , "🏴", "🏁"]
            t2stage.innerHTML = "Stage " + res.stage.stage_num + " <big>" + flags[res.flag_state] + "</big> flag"
            getSchedule().then(function (schedule) {
                let findrace = schedule.find(function (schedule) {
                    return schedule.race_id == res.race_id
                })
                t2broadcast.innerText = findrace.television_broadcaster + " / " + findrace.radio_broadcaster
            })
        })

    </script>


    <script>
        showLeaderboard().then(function (res) {
            t3.innerHTML = null
            res.forEach(function (each) {
                let tr = t3.insertRow()
                tr.insertCell().innerText = each.pos
                tr.insertCell().innerText = each.name
                let td = tr.insertCell()
                each.players.forEach(function (item) {
                    td.innerHTML += "<div><b>" + item.name + "</b> <small>" + (item.score || "") + "</small>" + "</div>"
                })
            })
        })
        
    </script>

    <script>

        getLeaderboard().then(function (res) {
            getLapNotes(res.race_id).then(function (res) {
                t4.innerHTML = null
                res.forEach(function (each) {
                    let tr = t4.insertRow()
                    tr.insertCell().innerHTML = "<small>" + each[0] + "</small>"
                    tr.insertCell().innerHTML = "<small>" + each[1] + "</small>"
                })
            })
        })

    </script>

</body>


</html>
