<!DOCTYPE html>
<html>

<head>
    <title>Stupid-Fast - Picks</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="./server.js"></script>
    <script src="./api.js"></script>
    <link rel="stylesheet" href="./css.css">

</head>

<body>
    <header><a href="./index.html"><img src="./sfbanner.png" alt="" /></a></header>

    <section>
        <span id="spanplayerid">Hello, </span>! <a href="./players.html" style="display: inline;"
            onclick="localStorage.removeItem('playerid')">Log out</a>?

    </section>

    <section id="s2"></section>


    <script>

        const url = new URL(window.location.href);
        const params = new URLSearchParams(url.search);
        const playerid = params.get('player');
        console.log(playerid)
        if (!playerid) {
            window.location.href = './players.html';
        }
        spanplayerid.innerText += playerid.toUpperCase();

        makePicks(playerid).then(function (res) {
            console.log("RES", res)
            res.drivers.forEach(function(each) {
                const lbl = document.createElement("LABEL")
                lbl.style.display = "block"

                const cb = document.createElement("INPUT")
                cb.type = "checkbox"
                cb.style.scale = "1.25"
                cb.style.verticalAlign = "middle"
                cb.id = each.id
                cb.checked = Boolean(each.player.id)
                cb.disabled = Boolean(each.player.id && each.player.id != playerid)
                cb.onchange = function () {
                    let player = playerid
                    if (!this.checked) player = ""
                    fetch("https://script.google.com/macros/s/AKfycbyEGYd3C0Zgd-mHbBrjDrdMUSsYvj_7oky1yIuffDrRk8rURlR-gV_IteIJHzznntfO/exec?PICKS", {
                        method: "post",
                        body: JSON.stringify([[Date.now(), res.id, res.group, each.id, this.checked ? playerid : "", each.name]])
                    })
                }

                const img = document.createElement("IMG")
                img.src = "https://cf.nascar.com/data/images/carbadges/1/" + each.badge + ".png"
                img.width = "66"
                img.style.margin = "5px"
                img.style.verticalAlign = "middle"

                const span = document.createElement("DIV")
                span.style.display = "inline-block"
                span.style.verticalAlign = "middle"
                span.innerHTML = each.name + "<br><small>" + each.player.name + "</small>"

                lbl.append(cb)
                lbl.append(img)
                lbl.append(span)
                s2.append(lbl)

            })

            document.querySelectorAll("LABEL")[10].before(document.createElement("HR"))



        })

    </script>


</body>

</html>
