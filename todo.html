    <script type="text/javascript">

function loadAll() {
  const ls = localStorage.getItem('tasks')
  console.log(ls)
  ta.value = ls
  toTable(ta.value)
}
loadAll()

function saveAll(x) {
  localStorage.setItem('tasks', x)
}

function toTable(x) {
  saveAll(x)
  t.innerText = null
  const split = x.split('\n')
  split.forEach(function (each) {
    const tr = t.insertRow()
    let td = tr.insertCell()
    const split2 = each.split(' -')
    td.innerText = split2[0]
    td.ondblclick = function () {
      findItem(split2[0])
    }
    td = tr.insertCell()
    if (split2[1] && split2[1].includes('done')) {
      tr.classList.add('done')
    }
  })
  ta.rows = split.length
}

function findItem(x) {
  const split = ta.value.split('\n')
  const fi = split.findIndex(function (each) {
    return each.includes(x)
  })
  if (split[fi].includes('done')) {
    let str = split[fi].replace(' -done', '').replace(' - done', '')
    split[fi] = str.trim()
  } else {
    split[fi] = x + ' - done'
  }
  const join = split.join('\n')
  console.log(join)
  ta.value = join
  toTable(ta.value)
}


  </script>
