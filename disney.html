<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Live Channel</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { margin:0; background:#000; }
  video { width:100vw; height:100vh; background:#000; }
</style>
</head>
<body>

<video id="player" controls autoplay playsinline preload="metadata"></video>

<script>
const PLAYLIST = [
  ["Monsters University_149.mp4",8940],
  ["Aristocats_82.mp4",4920],
  ["Cinderella_118.mp4",7080],
  ["Hunchback_89.mp4",5340],
  ["Lion King_87.mp4",5220],
  ["Pocahontas_115.mp4",6900],
  ["Snow White_108.mp4",6480],
  ["Mulan_119.mp4",7140],
  ["Aladdin_119.mp4",7140],
  ["Beauty and the Beast_119.mp4",7140],
  ["Little Mermaid_84.mp4",5040],
  ["Moana_100.mp4",6000],
  ["101 Dalmatians_83.mp4",4980],
  ["Tangled_97.mp4",5820],
  ["Sleeping Beauty_88.mp4",5280],
  ["Fox and the Hound_85.mp4",5100],
  ["Toy Story_82.mp4",4920],
  ["Formula Student Germany_15.mp4",900],
]

// ---- helpers ----
const totalDuration = PLAYLIST.reduce((s, [,d]) => s + d, 0);

function urlForTitle(title) {
  return "https://schweissguth.ngrok.app/Disney/" + encodeURIComponent(title);
}

function pickFromTime(t) {
  for (let i = 0; i < PLAYLIST.length; i++) {
    const [title, dur] = PLAYLIST[i];
    if (t < dur) return { index:i, title, offset:t };
    t -= dur;
  }
  return { index:0, title:PLAYLIST[0][0], offset:0 };
}

// ---- initial tune‑in ----
const video = document.getElementById("player");

// global channel position
const channelSeconds = (Date.now() / 1000) % totalDuration;

// pick video + offset
let current = pickFromTime(channelSeconds);

// load
video.src = urlForTitle(current.title);

// once metadata exists, seek directly
video.addEventListener("loadedmetadata", () => {
  video.currentTime = current.offset;
});

// advance naturally
video.addEventListener("ended", () => {
  current.index = (current.index + 1) % PLAYLIST.length;
  current.title = PLAYLIST[current.index][0];
  current.offset = 0;

  video.src = urlForTitle(current.title);
  video.play();
});
</script>

</body>
</html>
